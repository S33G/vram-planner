---
name: Sync Hugging Face models

on:
  schedule:
    # Mondays at 06:17 UTC. Off-peak so HF API rate limits are calmer.
    - cron: '17 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-hf-models
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run sync script
        env:
             # Optional: set repo secret HF_TOKEN to access gated repos (Llama, Gemma, ...)
            HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: pnpm run sync:models
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- lib/models.generated.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to lib/models.generated.json; skipping tests and PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected changes to lib/models.generated.json."
          fi
      - name: Run unit tests
        if: steps.diff.outputs.changed == 'true'
        run: pnpm test
      - name: Open PR with refreshed model list
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: sync Hugging Face models"
          title: "chore: sync Hugging Face models"
          branch: chore/sync-hf-models
          delete-branch: true
          add-paths: |
            lib/models.generated.json
          body: |
            Automated weekly sync of `lib/models.generated.json` from the Hugging Face Hub.
            
            Source allow-list: `scripts/hf-sources.json`.
            Generator: `scripts/sync-hf-models.ts` (run via `npm run sync:models`).
            
            Curated entries in `lib/models.curated.ts` always win on `id` collisions, so this PR only changes auto-generated rows.
            
            Review the diff for any unexpected jumps in `weightsGb`, `kvCachePer1kTokens`, or `contextLength` before merging. Merging triggers the existing `Deploy to GitHub Pages` workflow.
